<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tour 360 - Tipon</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    #viewerWrap {
      position: relative;
      width: 100%;
      height: 100vh;
      background: black;
    }

    #panorama {
      width: 100%;
      height: 100%;
    }

    #overlayPanel {
      position: absolute;
      top: 14px;
      left: 50px;
      z-index: 30;
      width: 320px;
      max-height: calc(100vh - 28px);
      background: rgba(31, 147, 151, 0.82);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #panelHeader {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #zoneList {
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 40vh;
    }

    .zone-button {
      border: none;
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
    }

    .zone-button.active {
      background: #0d6efd;
    }

    #scenePanel {
      padding: 10px;
    }

    .ctrl-btn {
      border: none;
      border-radius: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      margin: 4px 4px 0 0;
    }

    #sceneTitle {
      font-weight: bold;
      margin-bottom: 6px;
    }

    #projectTitle {
      margin: 0;
      font-size: 20px;
    }

    #projectSubtitle {
      margin: 4px 0 0 0;
      font-size: 13px;
      opacity: 0.9;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="viewerWrap">
    <div id="panorama"></div>

    <div id="overlayPanel">
      <div id="panelHeader">
        <div>
          <h1 id="projectTitle">Cargando...</h1>
          <p id="projectSubtitle">Tour VR 360</p>
        </div>
        <button id="togglePanelBtn" class="ctrl-btn">☰</button>
      </div>

      <div id="zoneList"></div>

      <div id="scenePanel">
        <p id="sceneTitle">Sin escena</p>
        <p id="sceneInfo">Selecciona una zona</p>

        <button class="ctrl-btn" id="prevBtn">Anterior</button>
        <button class="ctrl-btn" id="nextBtn">Siguiente</button>
        <button class="ctrl-btn" id="fullscreenBtn">⛶ Pantalla Completa</button>

        <a href="https://shinnn86.github.io/RMTour-Pachacamac/">
          <button class="ctrl-btn" type="button">Pachacamac</button>
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
